name: Build-Release

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      # 移除 Gradle 缓存加密（无密钥时无需配置）
      - uses: gradle/actions/setup-gradle@v5

      # 完全移除所有签名文件/密码写入步骤（Debug 包无需签名）
      
      - run: chmod 777 ./gradlew
      # 仅构建 GKD Debug 包（核心：只执行 Debug 构建，避开 Release 签名）
      - run: ./gradlew app:assembleGkdDebug

      # 上传 Debug 包产物（路径对应 Debug 构建）
      - uses: actions/upload-artifact@v4
        with:
          name: debug-release
          path: app/build/outputs/apk/gkd/debug

      - uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: app/build/outputs

      - uses: actions/upload-artifact@v4
        with:
          name: CHANGELOG.md
          path: CHANGELOG.md

  release:
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: outputs
          path: outputs

      - uses: actions/download-artifact@v4
        with:
          name: debug-release
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: CHANGELOG.md

      - run: ls -R

      # 新增：删除已有 Tag 和 Release（避免重复）
      - name: Delete existing release and tag
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          tag_name: ${{ github.ref_name }}
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: ./CHANGELOG.md
          prerelease: ${{ contains(github.ref_name, 'beta') }}

      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/app-gkd-debug.apk
          asset_name: gkd-${{ github.ref_name }}-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - run: zip -r outputs.zip outputs
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: outputs.zip
          asset_name: outputs-${{ github.ref_name }}.zip
          asset_content_type: application/zip